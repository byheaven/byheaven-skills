# .github/workflows/release.yml
# Responsibility: Triggered by tag push (created by release-please after PR merge).
# Reads the human-edited CHANGELOG.md to create the GitHub Release.
# No publish step — this is a Claude plugin monorepo distributed via marketplace.

name: Release

on:
  push:
    tags:
      - 'byheaven-skills-[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Extract this version's section from the human-edited CHANGELOG.md
      - name: Extract release notes from CHANGELOG.md
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/extract-release-notes.sh
          ./scripts/extract-release-notes.sh "$REF_NAME"

      # Build the release title: "1.2.0 - Headline" or just "1.2.0" if no headline
      - name: Read release title
        id: title
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -s RELEASE_TITLE.txt ]]; then
            TITLE="${REF_NAME} - $(cat RELEASE_TITLE.txt)"
          else
            TITLE="${REF_NAME}"
          fi
          echo "name=$TITLE" >> "$GITHUB_OUTPUT"

      # Create GitHub Release using the extracted content
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.title.outputs.name }}
          body_path: RELEASE_NOTES.md
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
