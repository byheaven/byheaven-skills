# .github/workflows/release-only.yml
# Responsibility: Triggered by tag push (created by release-please after PR merge).
# Reads the human-edited CHANGELOG.md to create the GitHub Release.
# No publish step — this is a Claude plugin monorepo distributed via marketplace.

name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Extract this version's section from the human-edited CHANGELOG.md
      - name: Extract release notes from CHANGELOG.md
        run: |
          chmod +x scripts/extract-release-notes.sh
          ./scripts/extract-release-notes.sh ${{ github.ref_name }}

      # Create GitHub Release using the extracted content
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
